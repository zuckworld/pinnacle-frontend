<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mornachvest - Swap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root{--primary:#6366f1;--muted:#6b7280;--surface:#f8fafc}
    body{background:var(--surface);color:#0f172a;font-family:Inter,Arial}
    .card{background:#fff;border:none}
    .text-secondary{color:#6b7280}
  </style>
</head>
<body>
  <header class="py-2 border-bottom" style="background:#fff">
    <div class="container">
      <a href="/user/dashboard.html" class="btn btn-sm btn-outline-secondary"><i class="bi bi-chevron-left"></i> Back to Dashboard</a>
    </div>
  </header>

  <main class="container py-4">
    <div class="card p-4 mb-4">
      <h3>Swap</h3>
      <p class="text-secondary">Swap between supported tokens.</p>
      <form>
        <div class="row g-3">
          <div class="col-md-5"><input class="form-control" placeholder="From (e.g., BTC)"/></div>
          <div class="col-md-5"><input class="form-control" placeholder="To (e.g., ETH)"/></div>
          <div class="col-md-2"><button class="btn btn-primary w-100">Swap</button></div>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
