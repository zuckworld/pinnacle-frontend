<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mornachvest - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root{--primary:#6366f1;--muted:#6b7280;--surface:#f8fafc}
    body { min-height:100vh; background: var(--surface); color:#0f172a; }
    .card { background: #ffffff; border: none; }
    .form-control:focus { box-shadow: 0 0 0 .12rem rgba(99,102,241,.18); }
    .brand { color:var(--primary); }
    .btn-primary { background: var(--primary); border: none; color: #fff }
    .btn-primary:hover { filter:brightness(.95); }
    .text-secondary { color: #6b7280; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-6 col-lg-7 col-md-8">
        <div class="text-center mb-4">
          <a href="../index.html" class="text-white text-decoration-none brand fw-bold fs-3">Mornachvest</a>
          <p class="text-secondary mt-2">Create your investment account securely.</p>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h3 class="mb-3">Create Your Account</h3>
            <p class="text-secondary mb-4">Join and start tracking your balance.</p>
            <div id="alertMessage" class="alert alert-danger d-none" role="alert"></div>
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Username</label>
                <input id="username" type="text" class="form-control form-control-lg" placeholder="Choose a username" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Email address</label>
                <input id="email" type="email" class="form-control form-control-lg" placeholder="you@example.com" required />
              </div>
              <div class="mb-4">
                <label class="form-label">Password</label>
                <input id="password" type="password" class="form-control form-control-lg" placeholder="Create a strong password" minlength="8" required />
                <div class="form-text text-secondary">Minimum 8 characters.</div>
              </div>
              <button class="btn btn-primary btn-lg w-100" type="submit">Create Account</button>
            </form>
            <div class="text-center mt-4 text-secondary">
              Already registered? <a href="login.html" class="text-white text-decoration-underline">Sign in</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const API_BASE_URL = '';
    const form = document.getElementById('registerForm');
    const alertMessage = document.getElementById('alertMessage');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      alertMessage.classList.add('d-none');
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !email || !password) {
        showError('Complete all fields before continuing.');
        return;
      }
      if (password.length < 8) {
        showError('Password must be at least 8 characters long.');
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const payload = await response.json();
        if (!response.ok) {
          showError(payload.error || 'Unable to create account.');
          return;
        }
        window.location.href = '/user/dashboard.html';
      } catch (error) {
        showError('Unable to connect to the server.');
      }
    });

    function showError(message) {
      alertMessage.textContent = message;
      alertMessage.classList.remove('d-none');
    }
  </script>
</body>
</html>
