<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mornachvest - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root{--primary:#6366f1;--muted:#6b7280;--surface:#f8fafc}
    body { min-height:100vh; background: var(--surface); color:#0f172a; }
    .card { background: #ffffff; border: none; }
    .form-control:focus { box-shadow: 0 0 0 .12rem rgba(99,102,241,.18); }
    .brand { color:var(--primary); }
    .btn-primary { background: var(--primary); border: none; color: #fff }
    .btn-primary:hover { filter:brightness(.95); }
    .text-secondary { color: #6b7280; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-5 col-lg-6 col-md-8">
        <div class="text-center mb-4">
          <a href="../index.html" class="text-white text-decoration-none brand fw-bold fs-3">Mornachvest</a>
          <p class="text-secondary mt-2">Secure investment dashboard access.</p>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h3 class="mb-3">Welcome back</h3>
            <p class="text-secondary mb-4">Sign in to manage your portfolio.</p>
            <div id="alertMessage" class="alert alert-danger d-none" role="alert"></div>
            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">Email or Username</label>
                <input id="identifier" type="text" class="form-control form-control-lg" placeholder="you@example.com" required />
              </div>
              <div class="mb-4">
                <label class="form-label">Password</label>
                <input id="password" type="password" class="form-control form-control-lg" placeholder="Password" minlength="8" required />
              </div>
              <button class="btn btn-primary btn-lg w-100" type="submit">Sign In</button>
            </form>
            <div class="text-center mt-4 text-secondary">
              New here? <a href="register.html" class="text-white text-decoration-underline">Create an account</a>
            </div>
          </div>
        </div>
      </div>
    </div>
            </div>
            <div id="jsStatus" style="position:fixed;bottom:12px;right:12px;background:#16a34a;color:#fff;padding:6px 8px;border-radius:6px;font-size:12px;display:none;z-index:9999">JS OK</div>
  <script>
    console.log('login.js: executing');
    try { document.getElementById('jsStatus').style.display = 'block'; } catch(e){}
    const API_BASE_URL = '';
    const form = document.getElementById('loginForm');
    const alertMessage = document.getElementById('alertMessage');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      alertMessage.classList.add('d-none');
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      if (!identifier || !password) {
        showError('Enter your email or username and password.');
        return;
      }

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const payload = await response.json();
        if (!response.ok) {
          showError(payload.error || 'Unable to sign in.');
          return;
        }
        window.location.href = '/user/dashboard.html';
      } catch (error) {
        showError('Unable to connect to the server.');
      }
    });

    function showError(message) {
      alertMessage.textContent = message;
      alertMessage.classList.remove('d-none');
    }
  </script>
</body>
</html>
