<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinnacle Investments - Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root{--primary:#6366f1;--muted:#6b7280;--surface:#f8fafc}
    body { min-height:100vh; background: var(--surface); color:#0f172a; }
    .card { background: #ffffff; border: none; }
    .btn-primary { background: var(--primary); border: none; color:#fff }
    .btn-primary:hover { filter:brightness(.95); }
    .text-secondary { color: #6b7280; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-xl-5 col-lg-6 col-md-8">
        <div class="text-center mb-4">
          <a href="../index.html" class="text-white text-decoration-none fs-3 fw-bold">Admin Control</a>
          <p class="text-secondary mt-2">Access the admin dashboard to manage users.</p>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4 p-md-5">
            <h3 class="mb-3">Admin login</h3>
            <div id="alertMessage" class="alert alert-danger d-none" role="alert"></div>
            <form id="adminLoginForm">
              <div class="mb-3">
                <label class="form-label">Email or Username</label>
                <input id="identifier" type="text" class="form-control form-control-lg" placeholder="admin@example.com" required />
              </div>
              <div class="mb-4">
                <label class="form-label">Password</label>
                <input id="password" type="password" class="form-control form-control-lg" placeholder="Password" minlength="8" required />
              </div>
              <button class="btn btn-primary btn-lg w-100" type="submit">Sign In</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const API_BASE_URL = '';
    const form = document.getElementById('adminLoginForm');
    const alertMessage = document.getElementById('alertMessage');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      alertMessage.classList.add('d-none');
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const payload = await response.json();
        if (!response.ok) {
          showError(payload.error || 'Login failed.');
          return;
        }
        if (payload.user?.role !== 'admin') {
          showError('Admin credentials required.');
          return;
        }
        window.location.href = '/admin/index.html';
      } catch (error) {
        showError('Unable to connect to the server.');
      }
    });

    function showError(message) {
      alertMessage.textContent = message;
      alertMessage.classList.remove('d-none');
    }
  </script>
</body>
</html>
